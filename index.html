<style>
:root {
  --bg: #08090e; --bg2: #111827; --bg3: #0c1322;
  --border: #1e293b; --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b; --text4: #475569;
  --accent: #818cf8; --accent2: #a5b4fc; --accent3: #c4b5fd;
  --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; --cyan: #06b6d4; --pink: #ec4899; --purple: #8b5cf6;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased;
}
#app { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
::-webkit-scrollbar { width: 0; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
textarea, input { font-family: inherit; }
textarea:focus, input:focus { outline: none; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
@keyframes glow { 0%,100% { opacity: .3; } 50% { opacity: 1; } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
@keyframes slideIn { from { opacity:0; transform: translateX(30px); } to { opacity:1; transform: translateX(0); } }

.fx-up { animation: fadeUp .45s ease both; }
.fx-in { animation: fadeIn .4s ease both; }
.fx-float { animation: float 3s ease-in-out infinite; }
.fx-slide { animation: slideIn .4s ease both; }

/* Shared */
.pill {
  padding: 7px 16px; border-radius: 24px; font-size: 13px; font-weight: 500;
  white-space: nowrap; transition: all .2s;
  border: 1.5px solid var(--border);
  background: var(--bg2); color: var(--text2);
}
.pill.on { border-color: var(--accent); background: rgba(129,140,248,.1); color: var(--accent); }

.card {
  border-radius: 14px; padding: 18px; margin-bottom: 12px;
  background: var(--bg2); border: 1px solid var(--border);
}

.btn-primary {
  width: 100%; padding: 15px; border-radius: 14px; font-size: 15px; font-weight: 700;
  background: var(--text); color: var(--bg); transition: all .3s; letter-spacing: -.3px;
}
.btn-primary:active { transform: scale(.98); }

.btn-accent {
  width: 100%; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 600;
  background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
}

.btn-ghost {
  width: 100%; padding: 13px; border-radius: 12px; font-size: 13px; font-weight: 500;
  border: 1.5px solid var(--border); background: var(--bg2); color: var(--text2);
}

.badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}

.dots { display: flex; gap: 6px; justify-content: center; padding: 12px 0; }
.dot {
  height: 8px; border-radius: 4px; transition: all .3s;
  background: var(--border);
}
.dot.active { width: 24px; background: var(--accent); }
.dot.done { width: 8px; background: rgba(129,140,248,.4); }
.dot.future { width: 8px; }

.compare-bad {
  padding: 14px; border-radius: 12px 12px 4px 4px;
  background: rgba(239,68,68,.06); border: 1px solid rgba(239,68,68,.15);
}
.compare-good {
  padding: 14px; border-radius: 4px 4px 12px 12px; margin-top: 2px;
  background: rgba(34,197,94,.06); border: 1px solid rgba(34,197,94,.15);
}

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  padding: 8px 20px; padding-bottom: max(8px, env(safe-area-inset-bottom));
  background: linear-gradient(to top, var(--bg) 70%, transparent);
  display: flex; gap: 4px;
}
.nav-btn {
  flex: 1; padding: 6px 4px; border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-size: 10px; font-weight: 500; color: var(--text4); transition: all .2s;

.nav-btn.on { background: rgba(129,140,248,.1); color: var(--accent2); }

.progress-ring {

}
.progress-ring-inner {

.section-tab {

.tag { display: inline-block; width: 6px; height: 6px; border-radius: 50%; }

// ─── ANALYZER (local, no API) ───

function analyzePrompt(sections) {
  const r = { score:0, items:[], tips:[] };
  let s = 0;

  // Role
  if(sections.role.trim()) {
    s += 15;
    if(sections.role.length > 80) { s += 5; r.items.push({t:"✅",c:"Role detalhado e específico"}); }
    else r.tips.push("Detalhe mais o Role — adicione anos de experiência e especialidade");
    if(/experiência|especialista|sênior|expert/i.test(sections.role)) { s += 3; }
  } else { r.items.push({t:"🔴",c:"Role está vazio — defina QUEM a IA deve ser"}); r.tips.push("Adicione: 'Você é um(a) [profissão] com [X] anos de experiência em [especialidade]'"); }

  // Context
  if(sections.context.trim()) {
    s += 15;
    if(sections.context.length > 100) { s += 5; r.items.push({t:"✅",c:"Contexto rico e informativo"}); }
    else r.tips.push("Expanda o contexto — quem é você, público-alvo, mercado, dados relevantes");
  } else { r.items.push({t:"🔴",c:"Contexto vazio — a IA não sabe nada sobre você"}); r.tips.push("Inclua: empresa, público, situação, dados relevantes"); }

  // Task
  if(sections.task.trim()) {
    s += 20;
    if(/crie|escreva|analise|compare|resuma|liste|gere|desenvolva|avalie|identifique/i.test(sections.task)) { s += 5; r.items.push({t:"✅",c:"Tarefa com verbo de ação claro"}); }
    else r.tips.push("Comece a tarefa com um verbo de ação: Crie, Analise, Escreva, Compare...");
    if(sections.task.length > 60) s += 3;
  } else { r.items.push({t:"🔴",c:"Tarefa vazia — sem ela, a IA não sabe o que fazer"}); r.tips.push("Defina exatamente o que a IA deve produzir"); }

  // Format
  if(sections.format.trim()) {
    s += 10;
    r.items.push({t:"✅",c:"Formato de saída definido"});
    if(/tabela|json|lista|markdown|bullet|seção|coluna/i.test(sections.format)) s += 3;
  } else { r.tips.push("Defina o formato de saída — tabela, lista, JSON, parágrafos?"); }

  // Constraints
  if(sections.constraints.trim()) {
    s += 8;
    r.items.push({t:"✅",c:"Restrições definidas"});
    if(/não|nunca|evite|máximo|mínimo|proibido/i.test(sections.constraints)) s += 3;
  } else { r.tips.push("Adicione restrições: tom de voz, tamanho, o que NÃO fazer"); }

  // Examples
  if(sections.examples.trim()) {
    s += 10;
    r.items.push({t:"✅",c:"Exemplos fornecidos — técnica poderosa!"});
    if(sections.examples.length > 80) s += 5;
    if(/bom|ruim|exemplo|correto|incorreto|✅|❌/i.test(sections.examples)) { s += 3; r.items.push({t:"✅",c:"Exemplos positivos E negativos — excelente!"}); }
  } else { r.tips.push("Adicione exemplos do que você quer e do que NÃO quer — é a técnica mais poderosa!"); }

  // Bonus
  if(/<\w+>/.test(sections.role+sections.context+sections.task)) { s += 2; }

  r.score = Math.min(100, s);
  
  if(r.score >= 80) r.grade = { label:"Excelente", emoji:"🔥", color:"#22c55e" };
  else if(r.score >= 60) r.grade = { label:"Bom", emoji:"👍", color:"#f59e0b" };
  else if(r.score >= 35) r.grade = { label:"Em progresso", emoji:"🔧", color:"#f59e0b" };
  else r.grade = { label:"Iniciando", emoji:"📝", color:"#ef4444" };

  return r;
}

// ─── RENDER ENGINE (Vanilla JS, no React needed) ───

const state = {
  view: "splash",  // splash | home | learn | build | result
  lesson: null,
  card: 0,
  quiz: null,
  completed: JSON.parse(localStorage.getItem("pa_done")||"[]"),
  sections: { role:"", context:"", task:"", format:"", constraints:"", examples:"" },
  activeSection: "role",
  template: null,
  copied: false,
};

function save() { localStorage.setItem("pa_done", JSON.stringify(state.completed)); }

function $(sel) { return document.querySelector(sel); }
function h(tag, cls, html, attrs) {
  const el = document.createElement(tag);
  if(cls) el.className = cls;
  if(html !== undefined && html !== null) el.innerHTML = html;
  if(attrs) Object.entries(attrs).forEach(([k,v]) => {
    if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if(k === "style" && typeof v === "object") Object.assign(el.style, v);
    else el.setAttribute(k, v);
  });
  return el;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.scrollTop = 0;

  // BG glows
  const bg = h("div","",null,{style:{position:"fixed",inset:"0",pointerEvents:"none",zIndex:"0"}});
  bg.appendChild(h("div","",null,{style:{position:"absolute",top:"-20%",left:"-10%",width:"60%",height:"50%",background:"radial-gradient(circle,rgba(99,102,241,.05) 0%,transparent 70%)"}}));
  bg.appendChild(h("div","",null,{style:{position:"absolute",bottom:"-20%",right:"-10%",width:"50%",height:"50%",background:"radial-gradient(circle,rgba(6,182,212,.03) 0%,transparent 70%)"}}));
  app.appendChild(bg);

  const main = h("div","",null,{style:{position:"relative",zIndex:"1"}});
  app.appendChild(main);

  if(state.view === "splash") renderSplash(main);
  else if(state.view === "home") renderHome(main);
  else if(state.view === "learn") renderLearn(main);
  else if(state.view === "build") renderBuild(main);
  else if(state.view === "result") renderResult(main);

  if(state.view !== "splash") renderNav(main);
}

  w.appendChild(h("div","fx-float","🧠",{style:{fontSize:"64px",marginBottom:"24px"}}));

  w.appendChild(t);
  w.appendChild(h("p","","Aprenda a falar com IA<br>como um profissional",{style:{color:"var(--text3)",fontSize:"14px",marginTop:"12px"}}));
  w.appendChild(h("p","","por Fabricio Julio",{style:{color:"var(--accent)",fontSize:"12px",fontWeight:"600",marginTop:"16px",letterSpacing:".5px",textTransform:"uppercase",opacity:".7"}}));
  const dots = h("div","",null,{style:{marginTop:"32px",display:"flex",gap:"6px"}});

/* ═══ LEARN ═══ */
function renderLearn(p) {
  if(!state.lesson) { state.lesson = LESSONS[0]; state.card = 0; }
  const lesson = state.lesson;
  const card = lesson.cards[state.card];
  const w = h("div","fx-in",null,{style:{padding:"0 0 100px"}});

  // Header
  const hdr = h("div","",null,{style:{padding:"16px 20px",display:"flex",alignItems:"center",gap:"12px",borderBottom:`1px solid ${lesson.color}12`}});
  hdr.appendChild(h("button","","←",{style:{color:"var(--text3)",fontSize:"20px"},onClick:()=>{ state.view="home"; render(); }}));
  hdr.appendChild(h("div","",`<span style="font-weight:700;color:${lesson.color}">${lesson.emoji} ${lesson.title}</span>`,{style:{flex:"1",fontSize:"15px"}}));
  hdr.appendChild(h("div","",`${state.card+1}/${lesson.cards.length}`,{style:{fontSize:"11px",color:"var(--text4)"}}));
  w.appendChild(hdr);

  // Dots
  const dots = h("div","dots");
  lesson.cards.forEach((_,i) => {
    const cls = i===state.card ? "dot active" : i<state.card ? "dot done" : "dot future";
    dots.appendChild(h("div",cls,null,{style:{width:i===state.card?"24px":"8px"}}));
  });
  w.appendChild(dots);

  // Content
  const content = h("div","fx-slide",null,{style:{padding:"8px 20px"}});
  content.appendChild(h("h2","",card.title,{style:{fontSize:"20px",fontWeight:"800",marginBottom:"16px",letterSpacing:"-.3px"}}));
  content.appendChild(h("p","",card.body.replace(/\n/g,"<br>"),{style:{fontSize:"14px",color:"#cbd5e1",lineHeight:"1.7",marginBottom:"20px"}}));

  // Blocks
  if(card.blocks) {
    const g = h("div","",null,{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"20px"}});
    card.blocks.forEach(b => {
      const bl = h("div","",null,{style:{padding:"14px",borderRadius:"12px",background:"var(--bg2)",border:"1px solid var(--border)"}});
      bl.appendChild(h("div","",b.icon,{style:{fontSize:"20px",marginBottom:"6px"}}));
      bl.appendChild(h("div","",b.name,{style:{fontSize:"13px",fontWeight:"600"}}));
      bl.appendChild(h("div","",b.desc,{style:{fontSize:"11px",color:"var(--text3)",marginTop:"2px"}}));
      g.appendChild(bl);
    });
    content.appendChild(g);
  }

  // Example
  if(card.example) {
    const bad = h("div","compare-bad");
    bad.appendChild(h("div","","❌ FRACO",{style:{fontSize:"11px",fontWeight:"700",color:"var(--red)",marginBottom:"6px"}}));
    bad.appendChild(h("div","",card.example.bad,{style:{fontSize:"13px",color:"#fca5a5",lineHeight:"1.5",fontStyle:"italic"}}));
    content.appendChild(bad);
    const good = h("div","compare-good");
    good.appendChild(h("div","","✅ FORTE",{style:{fontSize:"11px",fontWeight:"700",color:"var(--green)",marginBottom:"6px"}}));
    good.appendChild(h("div","",card.example.good.replace(/\n/g,"<br>"),{style:{fontSize:"13px",color:"#86efac",lineHeight:"1.5"}}));
    content.appendChild(good);
  }

  // Quiz
  if(card.quiz) {
    card.quiz.options.forEach((opt,i) => {
      const revealed = state.quiz !== null;
      let bg = "var(--bg2)", border = "var(--border)", col = "var(--text)";
      if(revealed && state.quiz===i && opt.correct) { bg="rgba(34,197,94,.08)"; border="rgba(34,197,94,.3)"; col="var(--green)"; }
      if(revealed && state.quiz===i && !opt.correct) { bg="rgba(239,68,68,.08)"; border="rgba(239,68,68,.3)"; col="var(--red)"; }
      if(revealed && state.quiz!==i && opt.correct) { bg="rgba(34,197,94,.05)"; border="rgba(34,197,94,.2)"; col="var(--green)"; }
      const prefix = revealed && opt.correct ? "✅ " : revealed && state.quiz===i && !opt.correct ? "❌ " : "";
      const btn = h("button","",prefix + opt.text,{style:{width:"100%",padding:"14px 16px",borderRadius:"12px",marginBottom:"8px",background:bg,border:`1.5px solid ${border}`,color:col,fontSize:"13px",lineHeight:"1.5",textAlign:"left",cursor:revealed?"default":"pointer"},onClick:()=>{ if(state.quiz===null){state.quiz=i; render();} }});
      content.appendChild(btn);
    });
    if(state.quiz !== null) {
      const exp = h("div","fx-up",null,{style:{padding:"14px",borderRadius:"12px",marginTop:"8px",background:"rgba(245,158,11,.06)",border:"1px solid rgba(245,158,11,.15)"}});
      exp.appendChild(h("div","","💡 Explicação",{style:{fontSize:"12px",fontWeight:"600",color:"var(--yellow)",marginBottom:"4px"}}));
      exp.appendChild(h("div","",card.quiz.explanation,{style:{fontSize:"13px",color:"#fcd34d",lineHeight:"1.5"}}));
      content.appendChild(exp);
    }
  }

  // Nav buttons
  const nav = h("div","",null,{style:{display:"flex",gap:"10px",marginTop:"24px"}});
  if(state.card > 0) {
    nav.appendChild(h("button","btn-ghost","← Voltar",{style:{flex:"1"},onClick:()=>{ state.card--; state.quiz=null; render(); }}));
  }
  const isLast = state.card >= lesson.cards.length - 1;
  const lessonIdx = LESSONS.findIndex(l=>l.id===lesson.id);
  const hasNext = lessonIdx < LESSONS.length - 1;
  const nextLabel = !isLast ? "Próximo →" : hasNext ? "Próxima Aula →" : "Concluir 🎉";
  const nextBtn = h("button","",nextLabel,{style:{flex:"2",padding:"14px",borderRadius:"12px",background:`linear-gradient(135deg,${lesson.color}cc,${lesson.color})`,color:"#fff",fontSize:"14px",fontWeight:"700"},onClick:()=>{
    if(!isLast) { state.card++; state.quiz=null; }
    else {
      if(!state.completed.includes(lesson.id)) { state.completed.push(lesson.id); save(); }
      if(hasNext) { state.lesson=LESSONS[lessonIdx+1]; state.card=0; state.quiz=null; }
      else { state.view="home"; }
    }
    render();
  }});
  nav.appendChild(nextBtn);
  content.appendChild(nav);
  w.appendChild(content);
  p.appendChild(w);
}

/* ═══ BUILD ═══ */
function renderBuild(p) {
  const w = h("div","fx-in",null,{style:{padding:"0 0 100px"}});
  const analysis = analyzePrompt(state.sections);

  // Header
  const hdr = h("div","",null,{style:{padding:"14px 20px",display:"flex",alignItems:"center",gap:"12px",borderBottom:"1px solid rgba(30,41,59,.2)"}});
  hdr.appendChild(h("button","","←",{style:{color:"var(--text3)",fontSize:"20px"},onClick:()=>{ state.view="home"; render(); }}));
  hdr.appendChild(h("div","","🔨 Construir Prompt",{style:{flex:"1",fontSize:"16px",fontWeight:"700"}}));
  const ring = h("div","progress-ring",null,{style:{background:`conic-gradient(${analysis.grade.color} ${analysis.score*3.6}deg, var(--border) 0deg)`}});
  const ringIn = h("div","progress-ring-inner",analysis.score+"",{style:{color:analysis.grade.color}});
  ring.appendChild(ringIn); hdr.appendChild(ring);
  w.appendChild(hdr);

  // Templates
  const tpl = h("div","",null,{style:{padding:"14px 20px 6px",display:"flex",gap:"8px",overflowX:"auto"}});
  TEMPLATES.forEach(t => {
    const cls = state.template===t.id ? "pill on" : "pill";
    tpl.appendChild(h("button",cls,t.emoji+" "+t.name,{onClick:()=>{
      state.template=t.id;
      Object.entries(t.s).forEach(([k,v])=>{ if(v) state.sections[k]=v; });
      render();
    }}));
  });
  w.appendChild(tpl);

  // Section tabs
  const tabs = h("div","",null,{style:{padding:"10px 20px 0",display:"flex",gap:"3px",overflowX:"auto"}});
  SECTION_META.forEach(s => {
    const filled = !!state.sections[s.id].trim();
    const active = state.activeSection === s.id;
    const cls = active ? "section-tab on" : "section-tab";
    const dot = filled ? '<span class="tag" style="background:var(--green)"></span>' : s.required ? '<span class="tag" style="background:var(--red)"></span>' : '';
    tabs.appendChild(h("button",cls,s.icon+" "+s.label+" "+dot,{onClick:()=>{ state.activeSection=s.id; render(); }}));
  });
  w.appendChild(tabs);

  // Editor
  const sec = SECTION_META.find(s=>s.id===state.activeSection);
  const ed = h("div","fx-up",null,{style:{padding:"12px 20px"}});

  // Tip
  const tip = h("div","",null,{style:{padding:"10px 14px",borderRadius:"10px",marginBottom:"10px",background:"rgba(129,140,248,.04)",border:"1px solid rgba(129,140,248,.1)",display:"flex",alignItems:"center",gap:"8px"}});
  tip.appendChild(h("span","","💡",{style:{fontSize:"14px"}}));
  tip.appendChild(h("span","",sec.tip,{style:{fontSize:"12px",color:"var(--accent2)",flex:"1",lineHeight:"1.4"}}));
  ed.appendChild(tip);

  // Textarea
  const ta = h("textarea","","",{style:{width:"100%",padding:"16px",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"14px",color:"var(--text)",fontSize:"14px",lineHeight:"1.7",resize:"vertical",minHeight:"170px"},placeholder:sec.placeholder});
  ta.value = state.sections[state.activeSection];
  ta.addEventListener("input", e => { state.sections[state.activeSection] = e.target.value; });
  ta.addEventListener("focus", e => e.target.style.borderColor = "rgba(129,140,248,.25)");
  ta.addEventListener("blur", e => e.target.style.borderColor = "var(--border)");
  ed.appendChild(ta);

  if(sec.required && !state.sections[state.activeSection].trim()) {
    ed.appendChild(h("p","","🔴 Obrigatório para um prompt funcional",{style:{fontSize:"11px",color:"var(--red)",marginTop:"6px"}}));
  }

  // Section nav
  const idx = SECTION_META.findIndex(s=>s.id===state.activeSection);
  const nav = h("div","",null,{style:{display:"flex",gap:"8px",marginTop:"12px"}});
  if(idx > 0) nav.appendChild(h("button","btn-ghost","← Anterior",{style:{flex:"1"},onClick:()=>{ state.activeSection=SECTION_META[idx-1].id; render(); }}));
  if(idx < SECTION_META.length-1) {
    nav.appendChild(h("button","","Próximo →",{style:{flex:"2",padding:"12px",borderRadius:"10px",background:"rgba(129,140,248,.12)",color:"var(--accent2)",fontSize:"13px",fontWeight:"600"},onClick:()=>{ state.activeSection=SECTION_META[idx+1].id; render(); }}));
  } else {
    nav.appendChild(h("button","","Ver Resultado 🚀",{style:{flex:"2",padding:"12px",borderRadius:"10px",background:"linear-gradient(135deg,#06b6d4,#818cf8)",color:"#fff",fontSize:"13px",fontWeight:"700"},onClick:()=>{ state.view="result"; render(); }}));
  }
  ed.appendChild(nav);
  w.appendChild(ed);
  p.appendChild(w);
}

/* ═══ RESULT ═══ */
function renderResult(p) {
  const analysis = analyzePrompt(state.sections);
  const prompt = buildPrompt();
  const w = h("div","fx-in",null,{style:{padding:"0 0 100px"}});

  // Header
  const hdr = h("div","",null,{style:{padding:"14px 20px",display:"flex",alignItems:"center",gap:"12px",borderBottom:"1px solid rgba(30,41,59,.2)"}});
  hdr.appendChild(h("button","","←",{style:{color:"var(--text3)",fontSize:"20px"},onClick:()=>{ state.view="build"; render(); }}));
  hdr.appendChild(h("div","","🚀 Seu Prompt",{style:{fontSize:"16px",fontWeight:"700"}}));
  w.appendChild(hdr);

  const body = h("div","",null,{style:{padding:"16px 20px"}});

  // Score card
  const sc = h("div","card",null,{style:{display:"flex",alignItems:"center",gap:"16px",marginBottom:"16px"}});
  const ring = h("div","progress-ring",null,{style:{width:"56px",height:"56px",background:`conic-gradient(${analysis.grade.color} ${analysis.score*3.6}deg, var(--border) 0deg)`,flexShrink:"0"}});
  const ringIn = h("div","progress-ring-inner",analysis.score+"",{style:{width:"46px",height:"46px",fontSize:"16px",fontWeight:"800",color:analysis.grade.color}});

  const info = h("div");
  info.appendChild(h("div","",analysis.grade.label+" "+analysis.grade.emoji,{style:{fontSize:"15px",fontWeight:"700"}}));
  const filled = Object.values(state.sections).filter(v=>v.trim()).length;
  info.appendChild(h("div","",filled+"/6 seções preenchidas",{style:{fontSize:"12px",color:"var(--text3)",marginTop:"2px"}}));
  sc.appendChild(info);
  body.appendChild(sc);

  // Analysis items
  const feedback = h("div","card",null,{style:{marginBottom:"16px"}});
  feedback.appendChild(h("div","","📊 Análise Automática",{style:{fontSize:"14px",fontWeight:"700",marginBottom:"12px"}}));
  analysis.items.forEach(item => {
    feedback.appendChild(h("div","",item.t+" "+item.c,{style:{fontSize:"13px",color:item.t==="✅"?"#86efac":"#fca5a5",lineHeight:"1.6",marginBottom:"4px"}}));
  });
  if(analysis.tips.length) {
    feedback.appendChild(h("div","","",{style:{height:"1px",background:"var(--border)",margin:"10px 0"}}));
    feedback.appendChild(h("div","","💡 Dicas de melhoria:",{style:{fontSize:"12px",fontWeight:"600",color:"var(--yellow)",marginBottom:"6px"}}));
    analysis.tips.forEach(tip => {
      feedback.appendChild(h("div","","⚡ "+tip,{style:{fontSize:"12px",color:"#fcd34d",lineHeight:"1.6",marginBottom:"4px",paddingLeft:"4px"}}));
    });
  }
  body.appendChild(feedback);

  // Prompt preview
  const preview = h("div","card",null,{style:{marginBottom:"16px"}});
  preview.appendChild(h("div","","📄 Prompt Final (XML)",{style:{fontSize:"13px",fontWeight:"600",color:"var(--text2)",marginBottom:"10px"}}));
  const pre = h("pre","",escHtml(prompt||"Preencha as seções para ver o prompt..."),{style:{padding:"14px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"10px",color:"#67e8f9",fontSize:"12px",fontFamily:"'JetBrains Mono',monospace",lineHeight:"1.6",whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:"350px",overflowY:"auto"}});
  preview.appendChild(pre);
  body.appendChild(preview);

  // Copy
  const copyBtn = h("button","btn-primary",state.copied?"✅ Copiado!":"📋 Copiar Prompt",{style:{marginBottom:"10px",background:state.copied?"var(--green)":"var(--text)",color:state.copied?"#fff":"var(--bg)"},onClick:()=>{
    navigator.clipboard.writeText(prompt);
    state.copied=true; render();
    setTimeout(()=>{ state.copied=false; render(); }, 2000);
  }});
  if(!prompt.trim()) { copyBtn.style.opacity = ".4"; copyBtn.style.pointerEvents = "none"; }
  body.appendChild(copyBtn);

  // Share
  body.appendChild(h("button","","📤 Compartilhar este app com amigos",{style:{width:"100%",padding:"14px",borderRadius:"14px",background:"rgba(34,197,94,.1)",border:"1.5px solid rgba(34,197,94,.25)",color:"var(--green)",fontSize:"14px",fontWeight:"600",marginBottom:"10px"},onClick:shareApp}));

  // Back to edit
  body.appendChild(h("button","btn-ghost","✏️ Voltar e editar",{onClick:()=>{ state.view="build"; render(); }}));

  // Author credit
  body.appendChild(h("div","","Criado por <strong>Fabricio Julio</strong>",{style:{textAlign:"center",fontSize:"11px",color:"var(--text4)",marginTop:"20px",paddingBottom:"8px"}}));

  w.appendChild(body);
  p.appendChild(w);
}

/* ═══ BOTTOM NAV ═══ */
function renderNav(p) {
  const nav = h("div","bottom-nav");
  [{v:"home",icon:"🏠",label:"Início"},{v:"learn",icon:"📖",label:"Aprender"},{v:"build",icon:"🔨",label:"Construir"}].forEach(item => {
    const cls = state.view===item.v || (item.v==="learn" && state.view==="learn") ? "nav-btn on" : "nav-btn";
    const btn = h("button",cls,`<span style="font-size:18px">${item.icon}</span>${item.label}`,{onClick:()=>{
      if(item.v==="learn" && !state.lesson) { state.lesson=LESSONS[0]; state.card=0; state.quiz=null; }
      state.view=item.v; render();
    }});
    nav.appendChild(btn);
  });
  p.appendChild(nav);
}

/* ═══ HELPERS ═══ */
function buildPrompt() {
  let p = "";
  if(state.sections.role) p += `<role>\n${state.sections.role}\n</role>\n\n`;
  if(state.sections.context) p += `<context>\n${state.sections.context}\n</context>\n\n`;
  if(state.sections.task) p += `<task>\n${state.sections.task}\n</task>\n\n`;
  if(state.sections.format) p += `<output_format>\n${state.sections.format}\n</output_format>\n\n`;
  if(state.sections.constraints) p += `<constraints>\n${state.sections.constraints}\n</constraints>\n\n`;
  if(state.sections.examples) p += `<examples>\n${state.sections.examples}\n</examples>`;
  return p.trim();
}

function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function shareApp() {
  const url = window.location.href;
  const text = "🧠 Aprenda a criar prompts profissionais para IA!\n\nApp gratuito e interativo com aulas, quizzes e um construtor de prompts.\nPor Fabricio Julio\n\nAcessa aí: " + url;
  if(navigator.share) navigator.share({title:"Prompt Architect",text,url});
  else { navigator.clipboard.writeText(text); alert("Link copiado! Cole no WhatsApp 📱"); }
}

// ─── BOOT ───
render();
</script>
</body>
</html>
